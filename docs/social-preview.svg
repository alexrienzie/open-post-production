<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="#0F172A"/>

  <!-- Title block (safe area: 80px inset) -->
  <text x="640" y="200" font-size="58" font-weight="800" fill="#F8FAFC" text-anchor="middle">open-post-production</text>
  <text x="640" y="252" font-size="23" fill="#94A3B8" text-anchor="middle">Catalog, search, and cut hundreds of hours of footage on your own hardware.</text>

  <!-- Simplified pipeline chips -->
  <!-- chips: x start 112, h 56, y 330; widths 190,160,170,230,210 with 24px arrow gaps -->
  <rect x="112" y="330" width="190" height="56" rx="10" fill="#1E293B" stroke="#34D399" stroke-width="2"/>
  <text x="207" y="365" font-size="18" fill="#E2E8F0" text-anchor="middle">hash + transcribe</text>

  <line x1="304" y1="358" x2="324" y2="358" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="326" y="330" width="160" height="56" rx="10" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text x="406" y="365" font-size="18" fill="#E2E8F0" text-anchor="middle">JSON catalog</text>

  <line x1="488" y1="358" x2="508" y2="358" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="510" y="330" width="170" height="56" rx="10" fill="#1E293B" stroke="#818CF8" stroke-width="2"/>
  <text x="595" y="365" font-size="18" fill="#E2E8F0" text-anchor="middle">SQLite + FAISS</text>

  <line x1="682" y1="358" x2="702" y2="358" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="704" y="330" width="230" height="56" rx="10" fill="#1E293B" stroke="#2DD4BF" stroke-width="2"/>
  <text x="819" y="365" font-size="18" fill="#E2E8F0" text-anchor="middle">ask in plain language</text>

  <line x1="936" y1="358" x2="956" y2="358" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="958" y="330" width="210" height="56" rx="10" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="1063" y="365" font-size="18" fill="#E2E8F0" text-anchor="middle">cut to NLE or MP4</text>

  <!-- Footer line -->
  <text x="640" y="470" font-size="20" fill="#94A3B8" text-anchor="middle">Built from open-source tools, operated with AI coding agents. No subscriptions.</text>
  <text x="640" y="505" font-size="17" fill="#64748B" text-anchor="middle">MIT licensed · sample corpus included · built mid-production on a feature documentary</text>
</svg>
